<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Trip Planner</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet"
href="css/planner.css">

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand">

<i class="fa-solid fa-plane"></i>

Smart Trip Planner

</a>

<a href="index.html"
class="btn btn-light">

Plan Another Trip

</a>

</div>

</nav>

<!-- Hero -->

<section class="hero">

<div class="container">

<div class="row">

<div class="col-lg-12">

<div class="tripHeader">

<h1 id="placeName"></h1>

<p id="description"></p>

</div>

</div>

</div>

</div>

</section>

<!-- Destination -->

<div class="container mt-5">

<div class="row">

<div class="col-md-6">

<img
id="destinationImage"
class="img-fluid rounded shadow">

</div>

<div class="col-md-6">

<div class="card p-4">

<h3>Trip Information</h3>

<hr>

<p>

<strong>Best Time :</strong>

<span id="bestTime"></span>

</p>

<p>

<strong>Weather :</strong>

<span id="weather"></span>

</p>

<p>

<strong>Budget :</strong>

<span id="budgetType"></span>

</p>

<p>

<strong>Days :</strong>

<span id="days"></span>

</p>

<p>

<strong>Persons :</strong>

<span id="persons"></span>

</p>

</div>

</div>

</div>

</div>

<!-- Hotels -->

<section class="container mt-5">

<h2 class="mb-4">

Recommended Hotels

</h2>

<div
class="row"
id="hotelList">

</div>

</section>

<!-- Restaurants -->

<section class="container mt-5">

<h2 class="mb-4">

Food Places

</h2>

<div
class="row"
id="restaurantList">

</div>

</section>

<!-- Activities -->

<section class="container mt-5">

<h2 class="mb-4">

Activities

</h2>

<div
class="row"
id="activityList">

</div>

</section>

<!-- Budget -->

<section class="container mt-5 mb-5">

<div class="card p-4">

<h2>

Estimated Budget

</h2>

<hr>

<p>

Hotel :
₹<span id="hotelCost"></span>

</p>

<p>

Food :
₹<span id="foodCost"></span>

</p>

<p>

Activities :
₹<span id="activityCost"></span>

</p>

<p>

Transport :
₹<span id="transportCost"></span>

</p>

<hr>

<h3>

Total Budget

₹<span id="totalBudget"></span>

</h3>

<h4 class="text-success">

Per Person

₹<span id="perPerson"></span>

</h4>

</div>

</section>

<script src="js/data.js"></script>

<script src="js/planner.js"></script>

</body>

</html>
